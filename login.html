<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 — 채움 운영 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'hecto-orange': {
            DEFAULT: '#FF5500',
            50:  '#FFF2ED',
            100: '#FFD4C2',
            400: '#FF8855',
            600: '#FF5500',
            700: '#E04A00',
            900: '#992E00',
          },
        },
        fontFamily: {
          sans: ['"Noto Sans KR"', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
        },
      },
    },
  };
</script>
<script src="auth.js"></script>
<script>(async function(){const s=await authGetSession();if(s)window.location.replace('index.html');})();</script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center font-sans text-slate-900 p-5">
<div class="w-full max-w-sm">

  <div class="text-center mb-6">
    <div class="text-5xl leading-none mb-2">🍽️</div>
    <div class="text-xl font-bold tracking-tight">구내식당(채움)</div>
    <div class="text-slate-500 text-sm mt-1">운영 대시보드</div>
  </div>

  <div class="bg-white border border-slate-200 rounded-2xl p-7 shadow-sm">
    <div class="flex bg-slate-100 rounded-xl p-1 mb-5 gap-1">
      <button id="adminBtn" onclick="switchMode('admin')"
        class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-900 shadow-sm">
        🔑 관리자
      </button>
      <button id="viewerBtn" onclick="switchMode('viewer')"
        class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-500">
        👁 열람
      </button>
    </div>

    <!-- 관리자 폼 -->
    <div id="adminForm">
      <div class="mb-3.5">
        <label class="block text-[11px] font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">아이디</label>
        <input type="text" id="adminId" placeholder="관리자 아이디" autocomplete="username"
          class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 bg-white outline-none transition focus:border-hecto-orange focus:ring-2 focus:ring-hecto-orange/20">
      </div>
      <div class="mb-3.5">
        <label class="block text-[11px] font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">비밀번호</label>
        <input type="password" id="adminPw" placeholder="비밀번호" autocomplete="current-password"
          class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 bg-white outline-none transition focus:border-hecto-orange focus:ring-2 focus:ring-hecto-orange/20">
      </div>
    </div>

    <!-- 열람 폼 -->
    <div id="viewerForm" class="hidden">
      <div class="mb-3.5">
        <label class="block text-[11px] font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">열람 비밀번호</label>
        <input type="password" id="viewerPw" placeholder="열람 비밀번호 입력" autocomplete="current-password"
          class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 bg-white outline-none transition focus:border-hecto-orange focus:ring-2 focus:ring-hecto-orange/20">
      </div>
      <div class="text-xs text-slate-500 -mt-1 mb-3.5 px-3 py-2 bg-slate-50 rounded-md border-l-2 border-slate-300 leading-relaxed">
        열람 모드에서는 데이터 조회 및 PDF 다운로드만 가능합니다.<br>데이터 업로드·수정은 관리자 모드에서 이용하세요.
      </div>
    </div>

    <div id="loginError" class="hidden bg-red-50 text-red-600 border border-red-200 rounded-lg px-3.5 py-2.5 text-sm mb-3.5"></div>

    <button id="loginBtn" onclick="doLogin()"
      class="w-full py-3 bg-hecto-orange hover:bg-hecto-orange-700 text-white rounded-lg text-[15px] font-semibold mt-1 transition disabled:opacity-55 disabled:cursor-not-allowed">
      로그인
    </button>
  </div>

  <div class="text-center text-xs text-slate-400 mt-5">ⓒ 2026 채움 구내식당 운영팀</div>
</div>

<script>
let _mode = 'admin';

const CLS_ACTIVE   = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-900 shadow-sm';
const CLS_INACTIVE = 'flex-1 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-500';

function switchMode(mode) {
  _mode = mode;
  document.getElementById('adminForm').classList.toggle('hidden', mode !== 'admin');
  document.getElementById('viewerForm').classList.toggle('hidden', mode !== 'viewer');
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('adminBtn').className  = mode === 'admin'  ? CLS_ACTIVE : CLS_INACTIVE;
  document.getElementById('viewerBtn').className = mode === 'viewer' ? CLS_ACTIVE : CLS_INACTIVE;
  const target = mode === 'admin' ? 'adminId' : 'viewerPw';
  setTimeout(() => { const el = document.getElementById(target); if (el) el.focus(); }, 0);
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '확인 중...';

  const id = _mode === 'admin' ? document.getElementById('adminId').value.trim() : '';
  const pw = _mode === 'admin'
    ? document.getElementById('adminPw').value
    : document.getElementById('viewerPw').value;

  const role = await authLogin(id, pw);

  if (role === 'admin' || role === 'viewer') {
    window.location.replace('index.html');
    return;
  }

  const errEl = document.getElementById('loginError');
  if (role === 'server_error') {
    errEl.textContent = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
  } else if (role === 'network_error') {
    errEl.textContent = '네트워크 연결을 확인해주세요.';
  } else {
    errEl.textContent = _mode === 'admin'
      ? '아이디 또는 비밀번호가 올바르지 않습니다.'
      : '비밀번호가 올바르지 않습니다.';
  }
  errEl.classList.remove('hidden');
  btn.disabled = false;
  btn.textContent = '로그인';
  const focusEl = document.getElementById(_mode === 'admin' ? 'adminPw' : 'viewerPw');
  if (focusEl) { focusEl.select(); focusEl.focus(); }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.addEventListener('DOMContentLoaded', () => { document.getElementById('adminId').focus(); });
</script>
</body>
</html>
